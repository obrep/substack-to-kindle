version: '3.9'

services:
  app:
    build: .
    container_name: substack-to-kindle
    restart: always
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./output:/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; exit(0 if time.time() - float(open('/tmp/healthcheck').read()) < 120 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "autoheal=true"
